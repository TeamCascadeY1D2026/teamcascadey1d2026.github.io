<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload & Share</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --accent: #555;
        --bg: #f8f8f8;
        --card: #fff;
        --border: #ccc;
        --radius: 0;
        --font: "Courier New", Courier, monospace;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        background-image: radial-gradient(circle, #ddd 1px, transparent 1px);
        background-size: 20px 20px;
        color: #333;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        width: 100%;
        max-width: 600px;
        padding: 20px;
      }
      h1 {
        font-size: 1.5rem;
        text-align: center;
        margin-bottom: 6px;
        color: #222;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .subtitle {
        text-align: center;
        color: #999;
        font-size: 0.85rem;
        margin-bottom: 28px;
      }

      .hidden {
        display: none;
      }
      .hidden.show {
        display: block;
      }
      .hidden.show-flex {
        display: flex;
      }

      .drop-zone {
        border: 2px dashed var(--border);
        padding: 48px 24px;
        text-align: center;
        cursor: pointer;
        transition: all 0.25s;
        background: var(--card);
      }
      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: #666;
        background: #f0f0f0;
      }
      .drop-zone input {
        display: none;
      }
      .drop-icon {
        font-size: 2.5rem;
        margin-bottom: 12px;
      }
      .drop-text {
        color: #888;
      }
      .drop-text span {
        color: #333;
        text-decoration: underline;
      }

      .file-preview {
        background: var(--card);
        border: 1px dashed var(--border);
        padding: 16px;
        margin-top: 16px;
        gap: 12px;
        align-items: center;
      }
      .file-icon {
        font-size: 1.8rem;
        flex-shrink: 0;
      }
      .file-info {
        flex: 1;
        min-width: 0;
      }
      .file-name {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-size {
        color: #999;
        font-size: 0.78rem;
        margin-top: 2px;
      }
      .file-remove {
        background: none;
        border: none;
        color: #aaa;
        font-size: 1.2rem;
        cursor: pointer;
        padding: 4px 8px;
      }
      .file-remove:hover {
        color: #c00;
      }

      .upload-btn {
        width: 100%;
        margin-top: 16px;
        padding: 14px;
        border: 2px dashed #888;
        background: #fff;
        color: #333;
        font-family: var(--font);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s;
      }
      .upload-btn:hover {
        background: #333;
        color: #fff;
        border-color: #333;
      }
      .upload-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .progress-bar {
        margin-top: 16px;
        height: 6px;
        background: #e0e0e0;
        border: 1px dashed var(--border);
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        background: #888;
        transition: width 0.3s;
      }

      .result {
        margin-top: 20px;
        background: var(--card);
        border: 1px dashed #999;
        padding: 16px;
      }
      .result-label {
        color: #333;
        font-size: 0.8rem;
        font-weight: 600;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .result-url-row {
        display: flex;
        gap: 8px;
      }
      .result-url {
        flex: 1;
        background: var(--bg);
        border: 1px dashed var(--border);
        padding: 10px 12px;
        color: #333;
        font-family: var(--font);
        font-size: 0.85rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .copy-btn {
        background: #fff;
        border: 1px dashed var(--border);
        color: #555;
        padding: 10px 14px;
        cursor: pointer;
        font-family: var(--font);
        font-size: 0.85rem;
        white-space: nowrap;
      }
      .copy-btn:hover {
        background: #333;
        color: #fff;
        border-color: #333;
      }
      .visit-link {
        display: inline-block;
        margin-top: 10px;
        color: #555;
        font-size: 0.82rem;
        text-decoration: none;
      }
      .visit-link:hover {
        text-decoration: underline;
      }

      .error {
        margin-top: 16px;
        background: #fff;
        border: 1px dashed #c00;
        padding: 14px;
        color: #c00;
        font-size: 0.85rem;
      }
      .status {
        text-align: center;
        margin-top: 12px;
        color: #999;
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Upload & Share</h1>
      <p class="subtitle">
        Upload a file to Puter and get a public URL instantly
      </p>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" />
        <div class="drop-icon">📁</div>
        <div class="drop-text">
          Drag & drop a file here or <span>browse</span>
        </div>
      </div>

      <div class="file-preview hidden" id="filePreview">
        <div class="file-icon" id="fileIcon">📄</div>
        <div class="file-info">
          <div class="file-name" id="fileName"></div>
          <div class="file-size" id="fileSize"></div>
        </div>
        <button class="file-remove" id="fileRemove" title="Remove">✕</button>
      </div>

      <button class="upload-btn hidden" id="uploadBtn">
        Upload & Generate Link
      </button>

      <div class="progress-bar hidden" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="status hidden" id="status"></div>

      <div class="result hidden" id="result">
        <div class="result-label">✓ Public URL</div>
        <div class="result-url-row">
          <div class="result-url" id="resultUrl"></div>
          <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
        <a class="visit-link" id="visitLink" href="#" target="_blank"
          >Open in new tab ↗</a
        >
      </div>

      <div class="error hidden" id="error"></div>
    </div>

    <script>
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const filePreview = document.getElementById("filePreview");
      const fileName = document.getElementById("fileName");
      const fileSize = document.getElementById("fileSize");
      const fileIcon = document.getElementById("fileIcon");
      const fileRemove = document.getElementById("fileRemove");
      const uploadBtn = document.getElementById("uploadBtn");
      const progressBar = document.getElementById("progressBar");
      const progressFill = document.getElementById("progressFill");
      const status = document.getElementById("status");
      const result = document.getElementById("result");
      const resultUrl = document.getElementById("resultUrl");
      const copyBtn = document.getElementById("copyBtn");
      const visitLink = document.getElementById("visitLink");
      const error = document.getElementById("error");

      let selectedFile = null;

      // File type icons
      function getIcon(type) {
        if (type.startsWith("image/")) return "🖼️";
        if (type.startsWith("video/")) return "🎬";
        if (type.startsWith("audio/")) return "🎵";
        if (type.includes("pdf")) return "📕";
        if (
          type.includes("zip") ||
          type.includes("rar") ||
          type.includes("tar")
        )
          return "📦";
        if (
          type.includes("text") ||
          type.includes("json") ||
          type.includes("xml")
        )
          return "📝";
        return "📄";
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1048576).toFixed(1) + " MB";
      }

      function setFile(file) {
        selectedFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
        fileIcon.textContent = getIcon(file.type);
        filePreview.classList.add("show-flex");
        uploadBtn.classList.add("show");
        result.classList.remove("show");
        error.classList.remove("show");
      }

      function clearFile() {
        selectedFile = null;
        fileInput.value = "";
        filePreview.classList.remove("show-flex");
        uploadBtn.classList.remove("show");
        result.classList.remove("show");
        error.classList.remove("show");
        status.classList.remove("show");
        progressBar.classList.remove("show");
      }

      // Drop zone events
      dropZone.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) setFile(fileInput.files[0]);
      });
      fileRemove.addEventListener("click", (e) => {
        e.stopPropagation();
        clearFile();
      });

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("dragover"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
      });

      // Upload logic
      uploadBtn.addEventListener("click", async () => {
        if (!selectedFile) return;

        uploadBtn.disabled = true;
        error.classList.remove("show");
        result.classList.remove("show");
        progressBar.classList.add("show");
        status.classList.add("show");

        try {
          // Step 1: Get or create the hosted subdomain
          status.textContent = "Preparing site...";
          progressFill.style.width = "15%";

          let subdomain = await puter.kv.get("site_subdomain");

          if (!subdomain) {
            subdomain = "file-" + crypto.randomUUID().split("-")[0];
            await puter.hosting.create(subdomain, ".");
            await puter.kv.set("site_subdomain", subdomain);
          }

          // Step 2: Write the file with a unique name
          status.textContent = "Uploading file...";
          progressFill.style.width = "40%";
          const ext = selectedFile.name.includes(".")
            ? "." + selectedFile.name.split(".").pop()
            : "";
          const uniqueName = crypto.randomUUID().split("-")[0] + ext;
          await puter.fs.write(`${uniqueName}`, selectedFile);

          // Step 3: Generate public link
          status.textContent = "Generating public link...";
          progressFill.style.width = "75%";

          const encodedName = encodeURIComponent(uniqueName);

          // Done!
          progressFill.style.width = "100%";
          const directUrl = `https://${subdomain}.puter.site/${encodedName}`;
          resultUrl.textContent = directUrl;
          visitLink.href = directUrl;
          result.classList.add("show");
          status.textContent = "Done!";

          setTimeout(() => {
            progressBar.classList.remove("show");
            status.classList.remove("show");
          }, 1000);
        } catch (err) {
          error.textContent = "Error: " + (err.message || err);
          error.classList.add("show");
          progressBar.classList.remove("show");
          status.classList.remove("show");
        }

        uploadBtn.disabled = false;
      });

      // Copy button
      copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(resultUrl.textContent).then(() => {
          copyBtn.textContent = "Copied!";
          setTimeout(() => (copyBtn.textContent = "Copy"), 1500);
        });
      });
    </script>
  </body>
</html>
